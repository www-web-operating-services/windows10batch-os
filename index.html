<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCNX OS FINAL WINDOWS STYLE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}
body{overflow:hidden;background:black;color:white}

/* MAIN */
#main{
 width:100%;height:100vh;
 background:url('https://i.ibb.co/PZkTNWgp/peakpx-1.jpg') center/cover;
 position:relative;
}

/* TIME (LEFT BOTTOM) */
#mainTime{position:absolute;bottom:20px;left:20px;}
#mTime{font-size:28px;}
#mDate{font-size:14px;opacity:0.8}

/* >>> */
.start-btn{
 position:absolute;
 bottom:20px;
 right:20px;
 font-size:22px;
 cursor:pointer;
}

/* BLUR LOGIN */
#blurLayer{
 position:absolute;width:100%;height:100%;
 backdrop-filter:blur(15px);
 background:rgba(0,0,0,0.4);
 display:none;justify-content:center;align-items:center;
}

/* LOGIN */
.profile-img{width:90px;border-radius:50%}
.login-box{display:flex;background:rgba(0,0,0,0.6);padding:8px}
.login-box input{background:transparent;border:none;color:white;padding:10px}
.arrow-btn{background:transparent;border:none;color:white}

/* DESKTOP */
#desktop{
 display:none;width:100%;height:100vh;
 background:url('https://i.ibb.co/BKzS8P5y/peakpx.jpg') center/cover;
 position:relative;
}

/* WINDOWS STYLE ICON GRID */
#desktopIcons{
 position:absolute;
 top:20px;
 left:20px;
 display:grid;
 grid-template-columns: repeat(1, 80px);
 grid-auto-rows: 90px;
 gap:15px;
}

.icon{
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 cursor:pointer;
}

.icon img{
 width:48px;height:48px;
}

.icon span{
 font-size:12px;
 margin-top:5px;
 text-align:center;
}

/* TASKBAR */
#taskbar{
 position:absolute;bottom:0;width:100%;height:50px;
 background:rgba(0,0,0,0.7);
 display:flex;align-items:center;
}

/* START MENU */
#startMenu{
 position:absolute;bottom:50px;left:0;
 width:250px;height:300px;
 background:rgba(0,0,0,0.9);
 display:none;padding:10px;
}
.shutdown{
 margin-top:auto;
 background:red;
 padding:5px;
 text-align:center;
 cursor:pointer;
}

/* TASK TIME */
#taskTime{margin-left:auto;padding:10px}

/* SHUTDOWN */
#shutdown{
 display:none;
 position:absolute;
 width:100%;height:100%;
 background:black;
 justify-content:center;
 align-items:center;
 font-size:30px;
}
</style>
</head>

<body onclick="startSound()">

<audio id="sound" src="https://files.catbox.moe/522394.mp3" ></audio>

<!-- MAIN -->
<div id="main">
 <div id="mainTime">
  <div id="mTime"></div>
  <div id="mDate"></div>
 </div>

 <div class="start-btn" onclick="showLogin(event)">>>></div>

 <div id="blurLayer" onclick="closeBlur()">
  <div onclick="event.stopPropagation()">
   <img src="https://i.ibb.co/4pDNDk1/avatar.png" class="profile-img">
   <div class="login-box">
    <input type="password" id="pass">
    <button class="arrow-btn" onclick="login()">→</button>
   </div>
  </div>
 </div>
</div>

<!-- DESKTOP -->
<div id="desktop" onclick="closeStart()">

 <!-- ICONS -->
 <div id="desktopIcons">

  <div class="icon" onclick="openApp('https://www.bing.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png">
    <span>Microsoft Edge</span>
  </div>

  <div class="icon" onclick="openApp('https://www.bing.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
    <span>Bing</span>
  </div>

  <div class="icon" onclick="openApp('#')">
    <img src="https://i.ibb.co/DPcwkwjW/windows-10-recreation-file-and-internet-explorer-yellow-and-blue-folder-illustration-png-clipart.jpg">
    <span>Folder</span>
  </div>

  <div class="icon" onclick="openApp('https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg')">
    <img src="https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg">
    <span>Recycle Bin</span>
  </div>

 </div>

 <!-- START MENU -->
 <div id="startMenu">
   <div>Start Menu</div>
   <div class="shutdown" onclick="shutdown()">Shutdown</div>
 </div>

 <!-- TASKBAR -->
 <div id="taskbar">
  <div onclick="toggleStart()">🪟</div>
  <div id="taskTime"></div>
 </div>

</div>

<!-- SHUTDOWN -->
<div id="shutdown">Shutting down...</div>

<script>

/* SOUND */
let played=false;
function startSound(){
 if(!played){
  let s=document.getElementById("sound");
  s.volume=0.4;
  s.play().catch(()=>{});
  played=true;
 }
}

/* TIME */
setInterval(()=>{
 let n=new Date();
 mTime.innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
 mDate.innerText = n.toDateString();
 taskTime.innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* LOGIN */
function showLogin(e){e.stopPropagation();blurLayer.style.display="flex";}
function closeBlur(){blurLayer.style.display="none";}
function login(){
 if(pass.value==="12345"){
  main.style.display="none";
  desktop.style.display="block";
 }
}

/* START MENU */
function toggleStart(){
 startMenu.style.display = (startMenu.style.display=="block")?"none":"block";
}
function closeStart(){startMenu.style.display="none";}

/* APPS */
function openApp(url){
 if(url!="#") window.open(url,"_blank");
}

/* SHUTDOWN */
function shutdown(){
 desktop.style.display="none";
 shutdown.style.display="flex";

 setTimeout(()=>{
  shutdown.style.display="none";
  main.style.display="block";
 },2000);
}

</script>

</body>
</html>
